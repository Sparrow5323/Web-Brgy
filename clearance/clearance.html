<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Damayang Lagi | Clearance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-container"><div class="view active-view" style="min-height:100vh;">
<div class="dashboard-layout" style="min-height:100vh;">
    <div class="sidebar" id="sidebarMount"></div>
    <div class="main-content">
        <div class="top-bar" id="topbarMount"></div>
        <div class="tab-pane active-tab">
            <div class="clearance-container">
                <div class="clearance-header">
                    <h3><i class="fas fa-file-signature"></i> Barangay Clearance</h3>
                    <button class="back-home" onclick="window.location.href='../services/services.html'">
                        <i class="fas fa-arrow-left"></i> Back to Services
                    </button>
                </div>
                <div class="clearance-body">
                    <div class="clearance-two-col">

                        <!-- FORM -->
                        <div class="clearance-form-col">
                            <div class="col-title"><i class="fas fa-edit"></i> Application Form</div>
                            <div class="clearance-field">
                                <label>Full Name *</label>
                                <input type="text" id="clrName" placeholder="Enter full name">
                            </div>
                            <div class="clearance-field">
                                <label>Date of Birth *</label>
                                <input type="date" id="clrDob">
                            </div>
                            <div class="clearance-field">
                                <label>Address *</label>
                                <input type="text" id="clrAddress" placeholder="Complete address">
                            </div>
                            <div class="clearance-field">
                                <label>Contact Number *</label>
                                <input type="tel" id="clrContact" placeholder="09XXXXXXXXX">
                            </div>
                            <div class="clearance-field">
                                <label>Purpose *</label>
                                <div class="purpose-options">
                                    <div class="purpose-option"><input type="radio" name="purpose" value="Employment" id="pEmp"><label for="pEmp">Employment</label></div>
                                    <div class="purpose-option"><input type="radio" name="purpose" value="School" id="pSch"><label for="pSch">School</label></div>
                                    <div class="purpose-option"><input type="radio" name="purpose" value="Business" id="pBiz"><label for="pBiz">Business</label></div>
                                    <div class="purpose-option"><input type="radio" name="purpose" value="Travel" id="pTrv"><label for="pTrv">Travel</label></div>
                                    <div class="purpose-option"><input type="radio" name="purpose" value="Others" id="pOth"><label for="pOth">Others</label></div>
                                </div>
                            </div>
                            <button type="button" class="submit-clearance-btn" id="clrSubmitBtn" onclick="submitClearance()">
                                <i class="fas fa-paper-plane"></i> Submit Application
                            </button>
                        </div>

                        <!-- HISTORY -->
                        <div class="clearance-history-col">
                            <div class="col-title"><i class="fas fa-history"></i> My Clearance History</div>
                            <div class="clearance-table-wrapper">
                                <table class="clearance-table">
                                    <thead>
                                        <tr><th>Ref #</th><th>Purpose</th><th>Status</th><th>Date Filed</th></tr>
                                    </thead>
                                    <tbody id="clearanceHistoryBody">
                                        <tr><td colspan="4" style="text-align:center;color:#999;padding:2rem;">
                                            <i class="fas fa-spinner fa-spin"></i> Loading...
                                        </td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div></div></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script src="../assets/js/topbar.js"></script>

<script>
requireAuth(async user => {
    loadSidebar('services');
    loadTopbar();

    // Pre-fill from profile
    const snap = await db.collection('users').doc(user.uid).get();
    if (snap.exists) {
        const p = snap.data();
        document.getElementById('clrName').value    = p.fullName || '';
        document.getElementById('clrAddress').value = p.address  || '';
        document.getElementById('clrContact').value = p.contactNumber || '';
        if (p.dob) document.getElementById('clrDob').value = p.dob;
    }

    loadClearanceHistory(user.uid);
});

async function submitClearance() {
    const name    = document.getElementById('clrName').value.trim();
    const dob     = document.getElementById('clrDob').value;
    const address = document.getElementById('clrAddress').value.trim();
    const contact = document.getElementById('clrContact').value.trim();
    const purpose = document.querySelector('input[name="purpose"]:checked')?.value;

    if (!name || !dob || !address || !contact || !purpose) {
        showToast('Please fill in all required fields and select a purpose.', '#dc2626');
        return;
    }

    const btn = document.getElementById('clrSubmitBtn');
    btn.disabled  = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

    try {
        const refNo = genRefNo('CLR');
        await db.collection('requests').add({
            uid:         auth.currentUser.uid,
            email:       auth.currentUser.email,
            serviceType: 'Barangay Clearance',
            fullName:    name,
            dob, address,
            contactNumber: contact,
            purpose, refNo,
            status:    'pending',
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        showToast('Application submitted! Ref: ' + refNo, '#333');
        loadClearanceHistory(auth.currentUser.uid);
    } catch (e) {
        showToast('Error: ' + e.message, '#dc2626');
    }

    btn.disabled  = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Application';
}

function loadClearanceHistory(uid) {
    db.collection('requests')
      .where('uid', '==', uid)
      .where('serviceType', '==', 'Barangay Clearance')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snap => {
          const tbody = document.getElementById('clearanceHistoryBody');
          if (snap.empty) {
              tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#999;padding:2rem;">No records yet</td></tr>`;
              return;
          }
          tbody.innerHTML = snap.docs.map(d => {
              const r = d.data();
              const cls = { pending:'status-pending-clearance', approved:'status-approved-clearance', rejected:'status-rejected-clearance' }[r.status] || 'status-pending-clearance';
              return `<tr>
                  <td style="font-size:0.7rem;">${r.refNo || '—'}</td>
                  <td>${r.purpose || '—'}</td>
                  <td><span class="status-badge ${cls}">${capitalize(r.status)}</span></td>
                  <td>${formatDate(r.createdAt)}</td>
              </tr>`;
          }).join('');
      });
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
</script>
</body>
</html>
