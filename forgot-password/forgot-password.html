<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Damayang Lagi | Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-container">
<div class="view active-view">
<div class="glass-card" style="align-items:center;justify-content:center;">
    <div style="background:white;border-radius:20px;width:90%;max-width:450px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.3);">

        <!-- Header -->
        <div style="background:linear-gradient(135deg,#831843 0%,#be185d 100%);padding:1.5rem;text-align:center;">
            <i class="fas fa-key" style="font-size:2rem;color:white;"></i>
            <h3 style="color:white;margin:0.5rem 0 0;font-size:1.2rem;">Reset Password</h3>
        </div>

        <!-- Step 1: Enter Email -->
        <div id="step1" style="padding:1.5rem;">
            <p style="color:#555;text-align:center;margin-bottom:1.5rem;font-size:0.9rem;">
                Enter your registered email address and we'll send you a password reset link.
            </p>

            <div id="step1Error" style="display:none;background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;padding:0.7rem 1rem;border-radius:10px;font-size:0.8rem;margin-bottom:1rem;"></div>
            <div id="step1Success" style="display:none;background:#f0f0f0;border:1px solid #86efac;color:#333;padding:0.7rem 1rem;border-radius:10px;font-size:0.8rem;margin-bottom:1rem;"></div>

            <div class="input-group" style="margin-bottom:1.5rem;">
                <label style="color:#333;text-shadow:none;">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input type="email" id="resetEmail" placeholder="your@email.com"
                       style="width:100%;padding:0.8rem;border:1px solid #fce7f3;border-radius:12px;background:#fff;color:#333;font-size:0.9rem;">
            </div>

            <button class="btn-login" id="sendResetBtn" onclick="handleSendReset()"
                    style="background:#831843;margin:0;">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
            <button class="btn-outline" onclick="window.location.href='../index.html'"
                    style="width:100%;margin-top:0.8rem;background:transparent;border:1px solid #fce7f3;color:#555;border-radius:2rem;padding:0.7rem;cursor:pointer;">
                <i class="fas fa-arrow-left"></i> Back to Login
            </button>
        </div>
    </div>
</div>
</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>

<script>
async function handleSendReset() {
    const email   = document.getElementById('resetEmail').value.trim();
    const errEl   = document.getElementById('step1Error');
    const succEl  = document.getElementById('step1Success');
    const btn     = document.getElementById('sendResetBtn');

    errEl.style.display  = 'none';
    succEl.style.display = 'none';

    if (!email) {
        errEl.textContent  = 'Please enter your email address.';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled    = true;
    btn.innerHTML   = '<i class="fas fa-spinner fa-spin"></i> Sending...';

    try {
        await auth.sendPasswordResetEmail(email);
        succEl.innerHTML    = `<i class="fas fa-check-circle"></i> Reset link sent to <strong>${email}</strong>. Check your inbox (and spam folder).`;
        succEl.style.display = 'block';
        btn.innerHTML       = '<i class="fas fa-check"></i> Email Sent';
    } catch (err) {
        btn.disabled  = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';

        const msgs = {
            'auth/user-not-found':  'No account found with that email address.',
            'auth/invalid-email':   'Please enter a valid email address.',
            'auth/network-request-failed': 'Network error. Check your connection.',
        };
        errEl.textContent  = msgs[err.code] || 'Could not send reset email. Please try again.';
        errEl.style.display = 'block';
    }
}

// Enter key support
document.getElementById('resetEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSendReset();
});
</script>
</body>
</html>
