<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Damayang Lagi | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-container">
<div class="view active-view">
<div class="glass-card">
<div class="signup-grid">
    <!-- BRAND SIDE -->
    <div>
        <div class="brand-header-row">
            <div class="brand-icon-wrapper" style="width:55px;height:55px;"><i class="fas fa-users"></i></div>
            <div>
                <h2 style="color:#fff;font-size:1.4rem;font-weight:700;">Create Account</h2>
                <p style="color:#ddd;font-size:0.85rem;">Barangay Damayang Lagi</p>
            </div>
        </div>
        <div class="barangay-img">
            <img src="https://placehold.co/500x300/ffffff/3b6e3b?text=Community" alt="Community">
        </div>
        <p style="color:#ddd;font-size:0.78rem;margin-top:1rem;line-height:1.6;">
            Create your account to access e-services, submit requests, and stay updated with barangay announcements.
        </p>
    </div>

    <!-- FORM SIDE -->
    <div>
        <div id="signupError" style="display:none;background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.4);color:#fca5a5;padding:0.7rem 1rem;border-radius:10px;font-size:0.8rem;margin-bottom:1rem;"></div>

        <form id="signupForm" onsubmit="return false;">
            <div class="form-row">
                <div class="input-group">
                    <label>First Name *</label>
                    <input type="text" id="firstName" placeholder="Juan" required>
                </div>
                <div class="input-group">
                    <label>Middle Name</label>
                    <input type="text" id="middleName" placeholder="Santos">
                </div>
                <div class="input-group">
                    <label>Last Name *</label>
                    <input type="text" id="lastName" placeholder="Dela Cruz" required>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label>Date of Birth *</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="input-group">
                    <label>Gender *</label>
                    <select id="gender" required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Civil Status *</label>
                    <select id="civilStatus" required>
                        <option value="">Select</option>
                        <option>Single</option>
                        <option>Married</option>
                        <option>Divorced</option>
                        <option>Widowed</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Complete Address *</label>
                <input type="text" id="address" placeholder="House no., Street, Barangay Damayang Lagi" required>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label>Contact Number *</label>
                    <input type="tel" id="contactNumber" placeholder="09XXXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label>Email *</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label>Password *</label>
                    <input type="password" id="signupPassword" placeholder="Min. 6 characters" required>
                </div>
                <div class="input-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                </div>
            </div>

            <div style="display:flex;gap:1rem;margin-top:0.5rem;">
                <button type="button" class="btn-primary" id="signupBtn" onclick="handleSignup()">
                    <i class="fas fa-user-plus"></i> CREATE ACCOUNT
                </button>
                <button type="button" class="btn-outline" onclick="window.location.href='../index.html'">
                    Back to Login
                </button>
            </div>
        </form>
    </div>
</div>
</div>
</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>

<script>
// If already logged in, go to dashboard
auth.onAuthStateChanged(user => {
    if (user) window.location.href = '../dashboard/dashboard.html';
});

async function handleSignup() {
    const errorEl = document.getElementById('signupError');
    const btn     = document.getElementById('signupBtn');
    errorEl.style.display = 'none';

    const firstName     = document.getElementById('firstName').value.trim();
    const middleName    = document.getElementById('middleName').value.trim();
    const lastName      = document.getElementById('lastName').value.trim();
    const dob           = document.getElementById('dob').value;
    const gender        = document.getElementById('gender').value;
    const civilStatus   = document.getElementById('civilStatus').value;
    const address       = document.getElementById('address').value.trim();
    const contactNumber = document.getElementById('contactNumber').value.trim();
    const email         = document.getElementById('signupEmail').value.trim();
    const password      = document.getElementById('signupPassword').value;
    const confirm       = document.getElementById('confirmPassword').value;

    // Validation
    if (!firstName || !lastName || !dob || !gender || !civilStatus || !address || !contactNumber || !email || !password) {
        showErr('Please fill in all required fields.'); return;
    }
    if (password !== confirm) {
        showErr('Passwords do not match.'); return;
    }
    if (password.length < 6) {
        showErr('Password must be at least 6 characters.'); return;
    }
    if (!/^09\d{9}$/.test(contactNumber)) {
        showErr('Contact number must be 11 digits starting with 09.'); return;
    }

    btn.disabled    = true;
    btn.innerHTML   = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

    try {
        // 1. Create Firebase Auth user
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        const uid  = cred.user.uid;

        // 2. Update display name
        await cred.user.updateProfile({ displayName: `${firstName} ${lastName}` });

        // 3. Save profile to Firestore
        await db.collection('users').doc(uid).set({
            uid,
            firstName,
            middleName,
            lastName,
            fullName: `${firstName} ${middleName ? middleName + ' ' : ''}${lastName}`.trim(),
            dob,
            gender,
            civilStatus,
            address,
            contactNumber,
            email,
            role:        'resident',
            status:      'active',
            createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
        });

        // onAuthStateChanged will redirect to dashboard
    } catch (err) {
        btn.disabled  = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> CREATE ACCOUNT';
        showErr(friendlyError(err.code));
    }

    function showErr(msg) {
        errorEl.textContent   = msg;
        errorEl.style.display = 'block';
    }
}

function friendlyError(code) {
    const map = {
        'auth/email-already-in-use':    'An account with this email already exists.',
        'auth/invalid-email':           'Please enter a valid email address.',
        'auth/weak-password':           'Password is too weak. Use at least 6 characters.',
        'auth/network-request-failed':  'Network error. Check your connection.',
        'auth/configuration-not-found': 'Firebase Auth is not enabled. Please enable Email/Password in the Firebase Console.',
        'auth/invalid-api-key':         'Invalid Firebase API key. Check your firebase-config.js.',
        'auth/operation-not-allowed':   'Email/Password sign-in is not enabled. Go to Firebase Console → Authentication → Sign-in method and enable it.',
    };
    return map[code] || ('Signup failed: ' + code);
}
</script>
</body>
</html>
